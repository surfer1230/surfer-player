<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>서퍼 플레이어 V4.0 (Live)</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Gowun+Dodum&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: #2a2a3a;
    --accent: #ff4d6d;
    --accent2: #7c3aed;
    --text: #e8e8f0;
    --muted: #5a5a7a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 30px 20px;
  }

  h1 { font-family: 'Gowun Dodum', sans-serif; font-size: 2.5rem; letter-spacing: 0.05em; margin-bottom: 6px; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 20px; }

  .top-panels { width: 100%; max-width: 860px; display: flex; gap: 15px; margin-bottom: 18px; flex-wrap: wrap; }
  .settings-box { flex: 1; min-width: 300px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 15px; }
  .settings-box h3 {font-family: 'Gowun Dodum', sans-serif; font-size: 1.1rem; color: var(--accent2); margin-bottom: 10px; }
  .macro-row { display: flex; gap: 8px; margin-bottom: 6px; align-items: center; font-size: 0.85rem;}
  .macro-row input { flex: 1; background: var(--bg); color: var(--text); border: 1px solid var(--border); padding: 6px; border-radius: 5px; outline: none; color:white; }

  .room-selector { width: 100%; max-width: 860px; background: var(--surface); border: 1px solid var(--accent2); border-radius: 12px; padding: 15px 20px; margin-bottom: 18px; display: flex; align-items: center; gap: 15px; }
  .room-selector label { font-family: 'Gowun Dodum', sans-serif; font-size: 1.2rem; color: var(--accent2); }
  .room-selector select { flex: 1; background: var(--bg); color: var(--text); border: 1px solid var(--border); padding: 10px; border-radius: 8px; cursor: pointer; }

  .player-wrap { position: relative; width: 100%; max-width: 860px; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
  .player-wrap:fullscreen { max-width: 100%; width: 100vw; height: 100vh; border: none; border-radius: 0; }
  #youtubePlayer { width: 100%; height: 100%; pointer-events: auto; }
  #danmakuOverlay { position: absolute; inset: 0; pointer-events: none; overflow: hidden; z-index: 10; }
  #subtitleDisplay {
    position: absolute; bottom: 10%; left: 50%; transform: translateX(-50%);
    text-align: center; width: 90%; pointer-events: none; z-index: 20;
    color: white; font-size: 1.3rem; font-family: 'Noto Sans KR', sans-serif;
    text-shadow: 2px 2px 2px rgba(0,0,0,0.8), -1px -1px 2px rgba(0,0,0,0.8);
    background: rgba(0,0,0,0.4); padding: 4px 10px; border-radius: 8px; display: none;
  }
  #fsInputWrapper {
    position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); width: 60%;
    background: rgba(0, 0, 0, 0.7); border: 2px solid var(--accent2); border-radius: 30px; padding: 12px 25px;
    z-index: 9999; display: none; text-align: center;
  }
  #fsInput { width: 100%; background: transparent; border: none; color: white; font-size: 1.2rem; outline: none; text-align: center; }

  .controls { width: 100%; max-width: 860px; background: var(--surface); border: 1px solid var(--border); border-radius: 0 0 12px 12px; padding: 14px 18px; display: flex; flex-direction: column; gap: 10px; }
  .progress-wrap { position: relative; height: 4px; background: var(--border); border-radius: 2px; cursor: pointer; }
  #progressBar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; pointer-events: none; }
  .progress-marker { position: absolute; top: 50%; transform: translate(-50%, -50%); width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.5); pointer-events: none; }

  .ctrl-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  button.ctrl-btn { background: none; border: none; color: var(--text); cursor: pointer; padding: 6px; font-size: 0.85rem; border: 1px solid var(--border); border-radius: 6px; }
  button.ctrl-btn:hover { background: var(--border); }
  .toggle-btn { margin-left: auto; padding: 5px 12px; border-radius: 20px; font-size: 0.72rem; border: 1px solid var(--border); cursor: pointer; background: none; color: var(--muted); }
  .toggle-btn.on { border-color: var(--accent2); color: var(--accent2); background: rgba(124,58,237,0.1); }

  .comment-panel { width: 100%; max-width: 860px; margin-top: 18px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; }
  .comment-panel h2 { font-family: 'Gowun Dodum', sans-serif; font-size: 1.2rem; color: var(--muted); margin-bottom: 14px; }
  
  .type-btn { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--muted); padding: 5px 12px; font-size: 0.75rem; cursor: pointer; transition: all 0.15s; }
  .type-btn.selected, .type-btn:hover { border-color: var(--accent2); color: var(--accent2); background: rgba(124,58,237,0.08); }
  .type-picks { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }

  .comment-input-row { display: flex; gap: 8px; margin-bottom: 10px; }
  #commentText { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 9px 14px; outline: none; }
  .color-dot { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
  .color-dot.selected { border-color: #fff; }
  .send-btn { background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; border-radius: 8px; color: #fff; padding: 9px 20px; font-family: 'Gowun Dodum', sans-serif; cursor: pointer; }

  .comment-list { margin-top: 16px; max-height: 180px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
  .comment-item { display: flex; align-items: center; gap: 10px; font-size: 0.8rem; padding: 6px 10px; border-radius: 6px; background: var(--bg); cursor: pointer; }
  .comment-del { margin-left: auto; color: var(--muted); background: none; border: none; cursor: pointer; }

  .danmaku-item { position: absolute; left: 100%; white-space: nowrap; font-weight: 700; font-family: 'Gowun Dodum', sans-serif; text-shadow: 2px 2px 4px rgba(0,0,0,1); pointer-events: none; will-change: transform; z-index: 100; }
  .danmaku-top { top: 10px; left: 50%; transform: translateX(-50%); animation: fadeInOut 4s ease forwards; }
  .danmaku-bottom { bottom: 10px; left: 50%; transform: translateX(-50%); animation: fadeInOut 4s ease forwards; }
  
  @keyframes flyLeft { from { transform: translateX(0); } to { transform: translateX(calc(-100vw - 100%)); } }
  @keyframes fadeInOut { 0% { opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { opacity: 0; } }
</style>
</head>
<body>

<h1>서퍼 플레이어 🏄‍♀️</h1>
<p class="subtitle">V4.0 파이어베이스 에디션 (Live)</p>

<div class="top-panels">
  <div class="settings-box">
    <h3>🎨 테마 꾸미기</h3>
    배경: <input type="color" id="themeBg" value="#0a0a0f">
    포인트: <input type="color" id="themeAccent" value="#ff4d6d">
  </div>
  <div class="settings-box">
    <h3>⚡ 원터치 주접</h3>
    <div class="macro-row"><span>[1]</span><input type="text" id="macro1" value="꺄아아악!!! ㅠㅠ"></div>
    <div class="macro-row"><span>[2]</span><input type="text" id="macro2" value="연출 미쳤다..."></div>
  </div>
</div>

<div class="room-selector">
  <label for="videoSelect">📺 방 선택:</label>
  <select id="videoSelect">
    <option value="dQw4w9WgXcQ">유튜브 테스트용 영상</option>
    <option value="lDUD3omAlHA">걸룰즈(Girlverse) 예고편</option>
    <option value="dObc3WRi6TU">플루토 EP 1-1</option>
  </select>
</div>

<div class="player-wrap" id="playerWrap">
  <div id="youtubePlayer"></div>
  <div id="danmakuOverlay"></div>
  <div id="subtitleDisplay"></div>
  <div id="fsInputWrapper"><input type="text" id="fsInput" placeholder="엔터치고 주접 발사!"></div>
</div>

<div class="controls">
  <div class="progress-wrap" id="progressWrap"><div id="progressBar"></div></div>
  <div class="ctrl-row">
    <button class="ctrl-btn" id="playBtn">▶</button>
    <span style="font-size:0.72rem;color:var(--muted);margin-left:5px;">소리</span>
    <input type="range" id="volSlider" min="0" max="100" step="5" value="100" style="width:60px;">
    <span id="timeDisplay">0:00 / 0:00</span>

    <span style="font-size:0.72rem;color:var(--muted);margin-left:10px;">속도</span>
    <input type="range" id="speedSlider" min="0.5" max="2" step="0.25" value="1" style="width:50px;">
    
    <span style="font-size:0.72rem;color:var(--muted);margin-left:10px;">글자</span>
    <input type="range" id="fontSizeSlider" min="16" max="48" step="2" value="26" style="width:50px;">
    
    <button class="ctrl-btn" id="fullscreenBtn" style="margin-left:10px;">🔲 전체화면</button>
    <button class="toggle-btn on" id="danmakuToggle">댓글 ON</button>
  </div>
</div>

<div class="comment-panel">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
    <h2 style="margin-bottom:0;">실시간 채팅</h2>
    <div style="display:flex;gap:8px;align-items:center;">
      <span id="saveStatus" style="font-size:0.72rem;color:var(--accent2);font-weight:bold;"></span>
      <button class="type-btn" id="exportBtn">📤 백업하기</button>
    </div>
  </div>

  <div class="comment-input-row">
    <input type="text" id="commentText" placeholder="함께 주접 떨어봐요!">
    <div id="colorPicks" style="display:flex; gap:5px;"></div>
    <button class="send-btn" id="sendBtn">발사 !</button>
  </div>

  <div class="type-picks" id="typePicks">
    <button class="type-btn selected" data-type="flow">흐르는 댓글</button>
    <button class="type-btn" data-type="top">상단 고정</button>
    <button class="type-btn" data-type="bottom">하단 고정</button>
  </div>

  <div class="comment-list" id="commentList"></div>

  <div style="display:flex;align-items:center;gap:10px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);">
    <label class="type-btn" style="cursor:pointer;">
      📄 자막 파일 (SRT/VTT)
      <input type="file" id="subFileInput" accept=".srt,.vtt" style="display:none;">
    </label>
    <span id="subStatus" style="font-size:0.78rem;color:var(--muted);">SRT / VTT 지원</span>
  </div>
</div>

<script type="module">
  // 1. 파이어베이스 라이브러리
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { getDatabase, ref, push, onChildAdded, onChildRemoved, remove, query, orderByChild } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

  // 2. 설정
  const firebaseConfig = {
    apiKey: "AIzaSyA0FqPa-Nr3L545wJpgUSV3GGdYbXn-ahQ",
    authDomain: "surfer-player.firebaseapp.com",
    projectId: "surfer-player",
    storageBucket: "surfer-player.firebasestorage.app",
    messagingSenderId: "660816674277",
    appId: "1:660816674277:web:9663d0baed3ccc92e0430c"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // 🔥 [핵심 수정] 유튜브 API를 여기서 강제로 로딩 (순서 꼬임 방지)
  const tag = document.createElement('script');
  tag.src = "https://www.youtube.com/iframe_api";
  const firstScriptTag = document.getElementsByTagName('script')[0];
  firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

  // --- 전역 변수 설정 ---
  let player;
  let comments = []; 
  let subtitles = [];
  let shown = new Set();
  let danmakuOn = true;
  let currentVideoKey = document.getElementById('videoSelect').value;
  let animationFrameId = null;
  const LANE_COUNT = 15;
  const lanes = Array(LANE_COUNT).fill(0);

  // --- 유튜브 API 연결 ---
  window.onYouTubeIframeAPIReady = function() {
    player = new YT.Player('youtubePlayer', {
      videoId: currentVideoKey,
      host: 'https://www.youtube.com', 
      playerVars: { 'enablejsapi': 1, 'autoplay': 0, 'rel': 0, 'modestbranding': 1 },
      events: { 'onStateChange': onPlayerStateChange }
    });
  };

  function onPlayerStateChange(event) {
    if (event.data === YT.PlayerState.PLAYING) {
      startDanmakuLoop();
      document.getElementById('playBtn').textContent = '⏸';
    } else {
      if (animationFrameId) cancelAnimationFrame(animationFrameId);
      document.getElementById('playBtn').textContent = '▶';
    }
  }

  // --- 🔥 파이어베이스 연동 핵심 로직 ---
  let dbRef = ref(db, 'comments/' + currentVideoKey); // 현재 방의 주소

  // 1. 방 바꿀 때 (비디오 변경)
  document.getElementById('videoSelect').addEventListener('change', (e) => {
    currentVideoKey = e.target.value;
    player.loadVideoById(currentVideoKey);
    
    // 기존 댓글 싹 비우고
    comments = [];
    shown.clear();
    document.getElementById('commentList').innerHTML = '';
    document.getElementById('danmakuOverlay').innerHTML = '';
    document.getElementById('progressWrap').querySelectorAll('.progress-marker').forEach(el => el.remove());

    // 새 방으로 접속!
    // 주의: 리스너 해제는 복잡해서 생략(새로고침 권장하지만, 일단 덮어씀)
    dbRef = ref(db, 'comments/' + currentVideoKey);
    connectDB(); 
  });

  // 2. DB에서 댓글 실시간 수신 (가장 중요!)
  function connectDB() {
    // 댓글이 추가되면(남이 쓰든 내가 쓰든)
    onChildAdded(query(dbRef, orderByChild('time')), (snapshot) => {
      const data = snapshot.val();
      data.key = snapshot.key; // 삭제할 때 필요해서 키 저장
      
      comments.push(data);
      comments.sort((a, b) => a.time - b.time); // 시간순 정렬
      
      renderList();
      updateMarkers();
      
      // 방금 들어온 따끈한 댓글이고, 현재 재생 시간 근처라면 바로 띄우기 (옵션)
      if (player && player.getPlayerState() === 1) {
        const now = player.getCurrentTime();
        if (Math.abs(data.time - now) < 2) { // 2초 이내 오차면 바로 발사
           spawnDanmaku(data);
           shown.add(data.id);
        }
      }
    });

    // 댓글이 삭제되면
    onChildRemoved(dbRef, (snapshot) => {
      const key = snapshot.key;
      comments = comments.filter(c => c.key !== key);
      renderList();
      updateMarkers();
    });
  }
  
  // 최초 연결
  connectDB();

  // 3. 댓글 쓰기 (이제 로컬 저장이 아니라 서버로 보냄!)
  function processNewComment(text) {
    if (!player) return;
    const newComment = {
      id: Date.now(),
      time: player.getCurrentTime(),
      text: text,
      color: selectedColor,
      type: selectedType
    };
    
    // 🔥 서버로 전송! (push 하면 onChildAdded가 알아서 내 화면에도 띄워줌)
    push(dbRef, newComment);
    
    // 저장 알림
    const status = document.getElementById('saveStatus');
    status.textContent = '☁️ 전송!';
    setTimeout(() => status.textContent = '', 2000);
  }

  // 4. 댓글 삭제 (서버에서 삭제)
  window.deleteComment = function(key) {
    if(confirm('진짜 지울까요?')) {
      remove(ref(db, 'comments/' + currentVideoKey + '/' + key));
    }
  }

  // --- 렌더링 및 UI 로직 (기존과 비슷함) ---
  function renderList() {
    const list = document.getElementById('commentList');
    list.innerHTML = '';
    comments.forEach(c => {
      const item = document.createElement('div');
      item.className = 'comment-item';
      item.innerHTML = `
        <span style="color:var(--accent)">${fmtTime(c.time)}</span>
        <span style="flex:1">${escHtml(c.text)}</span>
        <button class="comment-del" onclick="deleteComment('${c.key}')">✕</button>
      `;
      // 클릭 시 이동
      item.onclick = (e) => { 
        if(e.target.className !== 'comment-del') { 
          player.seekTo(c.time, true); 
          shown.clear(); 
          document.getElementById('danmakuOverlay').innerHTML = '';
        } 
      };
      list.appendChild(item);
    });
  }

  function updateMarkers() {
    const wrap = document.getElementById('progressWrap');
    // 기존 마커 제거
    wrap.querySelectorAll('.progress-marker').forEach(e => e.remove());
    if (!player || !player.getDuration) return;
    const dur = player.getDuration();
    comments.forEach(c => {
      const marker = document.createElement('div'); 
      marker.className = 'progress-marker';
      marker.style.left = (c.time / dur * 100) + '%'; 
      marker.style.background = c.color;
      wrap.appendChild(marker);
    });
  }

  // --- 탄막 루프 (기존 유지) ---
  function startDanmakuLoop() {
    if (animationFrameId) cancelAnimationFrame(animationFrameId);
    function loop() {
      if (!player || !player.getCurrentTime) return;
      if (player.getPlayerState() !== YT.PlayerState.PLAYING) return;
      
      const now = player.getCurrentTime();
      const dur = player.getDuration();
      if(dur) {
        document.getElementById('progressBar').style.width = (now / dur) * 100 + '%';
        document.getElementById('timeDisplay').textContent = `${fmtTime(now)} / ${fmtTime(dur)}`;
      }

      comments.forEach(c => {
        if (danmakuOn && !shown.has(c.id) && c.time <= now && c.time > now - 0.5) {
          spawnDanmaku(c);
          shown.add(c.id);
        }
      });

      // 자막 표시
      const subDiv = document.getElementById('subtitleDisplay');
      const activeSub = subtitles.find(s => now >= s.start && now <= s.end);
      if (activeSub) {
        subDiv.style.display = 'block';
        subDiv.innerHTML = activeSub.text; 
      } else {
        subDiv.style.display = 'none';
      }

      animationFrameId = requestAnimationFrame(loop);
    }
    loop();
  }

  // --- 기타 유틸 및 이벤트 ---
  function findLane(now) {
    let best = 0;
    for (let i = 0; i < LANE_COUNT; i++) {
      if (lanes[i] < lanes[best]) best = i;
    }
    return best;
  }

  function spawnDanmaku(c) {
    const el = document.createElement('div');
    el.className = 'danmaku-item'; 
    el.textContent = c.text; 
    el.style.color = c.color;
    const fontSize = parseInt(document.getElementById('fontSizeSlider').value);
    el.style.fontSize = fontSize + 'px';
    const overlay = document.getElementById('danmakuOverlay');
    
    if (c.type === 'top') {
      el.className += ' danmaku-top';
    } else if (c.type === 'bottom') {
      el.className += ' danmaku-bottom';
    } else {
      const lane = findLane(player.getCurrentTime());
      const laneH = (overlay.offsetHeight || 400) / LANE_COUNT;
      el.style.top = (lane * laneH) + 'px'; 
      const speedVal = parseFloat(document.getElementById('speedSlider').value); 
      const duration = 8 / speedVal; 
      el.style.animation = `flyLeft ${duration}s linear forwards`;
      lanes[lane] = player.getCurrentTime() + (duration * 0.4); 
    }
    
    overlay.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }

  // 자막 파싱
  function parseSRT(data) {
    data = data.replace(/\r\n|\r/g, '\n'); 
    const regex = /(\d+:\d{2}:\d{2}[,.]\d{3}) --> (\d+:\d{2}:\d{2}[,.]\d{3})/g;
    const items = [];
    let array = data.split('\n\n');
    array.forEach(block => {
      const match = regex.exec(block);
      if (match) {
        const start = timeToSec(match[1]);
        const end = timeToSec(match[2]);
        const parts = block.split(match[0]);
        if(parts[1]) {
          let cleanText = escHtml(parts[1].trim());
          cleanText = cleanText.replace(/\n/g, '<br>');
          items.push({ start, end, text: cleanText });
        }
      }
      regex.lastIndex = 0;
    });
    return items;
  }

  function escHtml(str) { return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function timeToSec(str) { const p = str.replace(',', '.').split(':'); return (parseFloat(p[0]) * 3600) + (parseFloat(p[1]) * 60) + parseFloat(p[2]); }
  function fmtTime(s) { if (isNaN(s)) return '0:00'; const m = Math.floor(s / 60); const sec = Math.floor(s % 60).toString().padStart(2, '0'); return `${m}:${sec}`; }

  // 이벤트 리스너들
  document.getElementById('volSlider').addEventListener('input', e => player && player.setVolume(e.target.value));
  document.getElementById('speedSlider').addEventListener('input', e => player && player.setPlaybackRate(parseFloat(e.target.value)));
  document.getElementById('playBtn').addEventListener('click', () => {
    if (!player) return;
    if (player.getPlayerState() === 1) player.pauseVideo(); else player.playVideo();
  });
  
  // 시크바 클릭 (초기화)
  document.getElementById('progressWrap').addEventListener('click', e => {
    if(!player || !player.getDuration) return;
    const rect = e.currentTarget.getBoundingClientRect();
    const pos = (e.clientX - rect.left) / rect.width;
    player.seekTo(player.getDuration() * pos, true);
    shown.clear(); 
    document.getElementById('danmakuOverlay').innerHTML = '';
  });

  // 내보내기 (백업)
  document.getElementById('exportBtn').addEventListener('click', () => {
    if (!comments.length) return alert('댓글이 없습니다!');
    const blob = new Blob([JSON.stringify(comments, null, 2)], { type: 'application/json' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = currentVideoKey + '_backup.json'; a.click();
  });

  // 자막 파일
  document.getElementById('subFileInput').addEventListener('change', e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => { subtitles = parseSRT(ev.target.result); document.getElementById('subStatus').textContent = `✅ ${file.name}`; };
    reader.readAsText(file, 'UTF-8'); e.target.value = '';
  });

  // 키보드 이벤트
  document.addEventListener('keydown', (e) => {
    const isFS = !!document.fullscreenElement;
    // 전체화면 엔터
    if (isFS && e.key === 'Enter') {
      const fsWrapper = document.getElementById('fsInputWrapper'); 
      const fsInput = document.getElementById('fsInput');
      if (fsWrapper.style.display === 'none' || !fsWrapper.style.display) { 
        fsWrapper.style.display = 'block'; 
        fsInput.focus(); 
      } else { 
        if (fsInput.value.trim()) processNewComment(fsInput.value.trim()); 
        fsInput.value = ''; 
        fsWrapper.style.display = 'none'; 
      }
      return;
    }
    if (e.target.tagName === 'INPUT') return;
    if (e.code === 'Space') { 
      if(player) {
         if (player.getPlayerState() === 1) player.pauseVideo(); else player.playVideo(); 
         e.preventDefault(); 
      }
    }
    if (['1','2','3'].includes(e.key)) { 
      const text = document.getElementById('macro' + e.key)?.value.trim(); 
      if (text) processNewComment(text); 
    }
  });

  // 채팅창 엔터키
  document.getElementById('commentText').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      document.getElementById('sendBtn').click();
    }
  });

  // 색상 및 타입 선택
  const COLORS = ['#ffffff', '#ff4d6d', '#ffd166', '#06d6a0', '#a78bfa'];
  let selectedColor = COLORS[0]; 
  let selectedType = 'flow';
  
  const colorPicks = document.getElementById('colorPicks');
  COLORS.forEach(c => {
    const dot = document.createElement('div'); dot.className = 'color-dot' + (c === selectedColor ? ' selected' : ''); dot.style.background = c;
    dot.onclick = () => { selectedColor = c; document.querySelectorAll('.color-dot').forEach(d=>d.classList.remove('selected')); dot.classList.add('selected'); };
    colorPicks.appendChild(dot);
  });
  
  document.querySelectorAll('.type-picks .type-btn').forEach(btn => {
    btn.addEventListener('click', () => { selectedType = btn.dataset.type; document.querySelectorAll('.type-picks .type-btn').forEach(b => b.classList.remove('selected')); btn.classList.add('selected'); });
  });

  document.getElementById('sendBtn').onclick = () => { 
    const input = document.getElementById('commentText'); 
    if (input.value.trim()) { 
      processNewComment(input.value.trim()); 
      input.value = ''; 
    } 
  };
  
  document.getElementById('fullscreenBtn').onclick = () => { 
    const wrap = document.getElementById('playerWrap'); 
    if (!document.fullscreenElement) wrap.requestFullscreen(); else document.exitFullscreen(); 
  };
  document.getElementById('danmakuToggle').onclick = function() { 
    danmakuOn = !danmakuOn; 
    this.classList.toggle('on'); 
    this.textContent = danmakuOn ? '댓글 ON' : '댓글 OFF'; 
    if(!danmakuOn) document.getElementById('danmakuOverlay').innerHTML = ''; 
  };

</script>
</body>
</html>
